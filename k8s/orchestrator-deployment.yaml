apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: devteam
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: devteam
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: orchestrator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: devteam
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: devteam
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/part-of: devteam
    spec:
      containers:
        - name: orchestrator
          image: devteam/orchestrator:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: devteam-config
            - secretRef:
                name: devteam-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
