apiVersion: v1
kind: Service
metadata:
  name: integrations
  namespace: devteam
  labels:
    app.kubernetes.io/name: integrations
    app.kubernetes.io/part-of: devteam
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
  selector:
    app.kubernetes.io/name: integrations
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integrations
  namespace: devteam
  labels:
    app.kubernetes.io/name: integrations
    app.kubernetes.io/part-of: devteam
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: integrations
  template:
    metadata:
      labels:
        app.kubernetes.io/name: integrations
        app.kubernetes.io/part-of: devteam
    spec:
      containers:
        - name: integrations
          image: devteam/integrations:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: devteam-config
            - secretRef:
                name: devteam-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
